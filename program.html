<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 15px; }
    .item { background: #16213e; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
    .item.active { border-color: #ff4444; background: #1f2d52; }
    .time { color: #ff4444; font-weight: bold; min-width: 50px; }
    .live { background: #ff4444; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: auto; }
  </style>
</head>
<body>
  <h2 style="text-align:center; margin-bottom:15px;">📅 Расписание на сегодня</h2>
  <div id="list"></div>

  <script>
    const BIN_ID = "69c813a3ed015c742bc5d6d2";
    const API_KEY = "$2a$10$9x7PNq9qagGerlxyZZ8pMeGMoBn94obeRi87pQFcppRjgFfy989Vq";

    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } })
      .then(r => r.json()).then(data => {
        const schedule = data.record?.schedule || [];
        const now = new Date();
        const currentMin = now.getHours() * 60 + now.getMinutes();
        let activeIdx = -1;

        schedule.sort((a,b) => a.time.localeCompare(b.time)).forEach((item, i) => {
            const [h, m] = item.time.split(':').map(Number);
            if (h * 60 + m <= currentMin) activeIdx = i;
        });

        document.getElementById('list').innerHTML = schedule.map((item, i) => `
            <div class="item ${i === activeIdx ? 'active' : ''}">
                <div class="time">${item.time}</div>
                <div><b>${item.title}</b><br><small style="opacity:0.6">${item.desc || ''}</small></div>
                ${i === activeIdx ? '<div class="live">В ЭФИРЕ</div>' : ''}
            </div>
        `).join('');
      });
  </script>
</body>
</html>
