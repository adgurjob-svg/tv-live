<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сегодня в эфире</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #ffffff);
      padding: 16px;
      min-height: 100vh;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
      color: var(--tg-theme-text-color, #fff);
    }
    .date {
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 20px;
    }
    .item {
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .item.active {
      border: 1px solid #ff4444;
    }
    .time {
      font-size: 15px;
      font-weight: 700;
      color: #ff4444;
      min-width: 50px;
    }
    .info { flex: 1; }
    .title { font-size: 15px; font-weight: 600; }
    .desc { font-size: 13px; opacity: 0.6; margin-top: 3px; }
    .live-badge {
      background: #ff4444;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .empty {
      text-align: center;
      opacity: 0.5;
      margin-top: 60px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <h1>📺 Сегодня в эфире</h1>
  <div class="date" id="date"></div>
  <div id="list"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Дата
    const now = new Date();
    document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', {
      weekday: 'long', day: 'numeric', month: 'long'
    });

    // Загружаем расписание
    fetch('https://adgurjob-svg.github.io/tv-live/data.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const list = document.getElementById('list');
        if (!data.length) {
          list.innerHTML = '<div class="empty">Расписание на сегодня не добавлено</div>';
          return;
        }

        const currentTime = now.getHours() * 60 + now.getMinutes();

        data.forEach(item => {
          const [h, m] = item.time.split(':').map(Number);
          const itemMinutes = h * 60 + m;
          const isActive = Math.abs(itemMinutes - currentTime) < 60;

          const div = document.createElement('div');
          div.className = 'item' + (isActive ? ' active' : '');
          div.innerHTML = `
            <div class="time">${item.time}</div>
            <div class="info">
              <div class="title">${item.title}</div>
              ${item.desc ? `<div class="desc">${item.desc}</div>` : ''}
            </div>
            ${isActive ? '<span class="live-badge">🔴 LIVE</span>' : ''}
          `;
          list.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('list').innerHTML =
          '<div class="empty">Не удалось загрузить расписание</div>';
      });
  </script>
</body>
</html>
