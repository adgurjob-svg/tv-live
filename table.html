<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблица</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 10px; }
    table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 10px; overflow: hidden; font-size: 13px; }
    th { background: #0f3460; padding: 10px; text-align: left; color: #ff4444; }
    td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .pts { font-weight: bold; color: #ff4444; }
  </style>
</head>
<body>
  <h2 style="text-align:center; margin-bottom:10px;">🏆 Таблица Лиги</h2>
  <table id="tbl">
    <thead><tr><th>#</th><th>Команда</th><th>И</th><th>В/Н/П</th><th class="pts">О</th></tr></thead>
    <tbody id="body"></tbody>
  </table>
  <script>
    const BIN_ID = "69c813a3ed015c742bc5d6d2";
    const API_KEY = "$2a$10$9x7PNq9qagGerlxyZZ8pMeGMoBn94obeRi87pQFcppRjgFfy989Vq";
    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } })
      .then(r => r.json()).then(data => {
        const table = data.record?.football_table || [];
        document.getElementById('body').innerHTML = table.map(item => `
            <tr><td>${item.pos}</td><td>${item.team}</td><td>${item.games}</td><td>${item.win_draw_loss}</td><td class="pts">${item.pts}</td></tr>
        `).join('');
      });
  </script>
</body>
</html>
