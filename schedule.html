<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ расписания</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
    button { width: 100%; padding: 12px; background: #ff4444; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .item { background: #16213e; padding: 10px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h3>📋 Редактор расписания</h3>
  <input type="time" id="t">
  <input type="text" id="name" placeholder="Название">
  <button onclick="add()">Добавить в список</button>
  <div id="list"></div>
  <button style="background:#4CAF50; margin-top:20px;" onclick="save()">💾 СОХРАНИТЬ ВСЁ</button>

  <script>
    const BIN_ID = "69c813a3ed015c742bc5d6d2";
    const API_KEY = "$2a$10$9x7PNq9qagGerlxyZZ8pMeGMoBn94obeRi87pQFcppRjgFfy989Vq";
    let schedule = [];

    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } })
      .then(r => r.json()).then(data => { schedule = data.record?.schedule || []; render(); });

    function render() {
        document.getElementById('list').innerHTML = schedule.map((item, i) => `
            <div class="item"><span>${item.time} - ${item.title}</span><span onclick="del(${i})" style="color:red; cursor:pointer">✕</span></div>
        `).join('');
    }
    function add() {
        const time = document.getElementById('t').value;
        const title = document.getElementById('name').value;
        if(time && title) { schedule.push({time, title}); schedule.sort((a,b)=>a.time.localeCompare(b.time)); render(); }
    }
    function del(i) { schedule.splice(i,1); render(); }
    async function save() {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
        const data = await r.json();
        const payload = { ...data.record, schedule: schedule };
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(payload)
        });
        alert("Сохранено!");
    }
  </script>
</body>
</html>
