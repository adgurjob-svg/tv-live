<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Прямой эфир</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    #overlay { position: absolute; z-index: 10; text-align: center; }
    #play-btn { background: #ff0000; color: white; border: none; border-radius: 50px; padding: 16px 32px; font-size: 18px; cursor: pointer; }
    #error { color: white; font-size: 16px; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <div id="overlay">
    <button id="play-btn">▶ Смотреть эфир</button>
    <div id="error">Не удалось загрузить видео</div>
  </div>
  <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const params = new URLSearchParams(window.location.search);
    const youtubeUrl = params.get('url');

    function loadVideo() {
      if (youtubeUrl) {
        const match = youtubeUrl.match(/(?:live\/|v=)([a-zA-Z0-9_-]+)/);
        if (match) {
          document.getElementById('overlay').style.display = 'none';
          document.getElementById('player').src =
            `https://www.youtube.com/embed/${match[1]}?autoplay=1&playsinline=1`;
        } else {
          document.getElementById('error').style.display = 'block';
        }
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    document.getElementById('play-btn').addEventListener('click', loadVideo);
  </script>
</body>
</html>
