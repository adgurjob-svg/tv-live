<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Прямой эфир</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    #overlay { position: absolute; z-index: 10; text-align: center; }
    #play-btn { background: #ff0000; color: white; border: none; border-radius: 50px; padding: 16px 32px; font-size: 18px; cursor: pointer; }
    #no-stream { color: white; font-size: 16px; text-align: center; padding: 40px; display: none; }
  </style>
</head>
<body>
  <div id="overlay">
    <button id="play-btn" style="display:none">▶ Смотреть эфир</button>
  </div>
  <div id="no-stream">😔 Эфир сейчас не идёт</div>
  <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const BIN_ID = "69c813a3ed015c742bc5d6d2";
    const API_KEY = "$2a$10$9x7PNq9qagGerlxyZZ8pMeGMoBn94obeRi87pQFcppRjgFfy989Vq";

    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { "X-Master-Key": API_KEY }
    })
    .then(r => r.json())
    .then(data => {
      const url = data.record?.stream_url;
      if (url) {
        const match = url.match(/(?:live\/|v=)([a-zA-Z0-9_-]+)/);
        if (match) {
          document.getElementById('play-btn').style.display = 'block';
          document.getElementById('play-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('player').src =
              `https://www.youtube.com/embed/${match[1]}?autoplay=1&playsinline=1`;
          };
        }
      } else {
        document.getElementById('no-stream').style.display = 'block';
      }
    })
    .catch(() => {
      document.getElementById('no-stream').style.display = 'block';
    });
  </script>
</body>
</html>
