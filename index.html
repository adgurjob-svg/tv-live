<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Прямой эфир</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    #overlay { position: absolute; z-index: 10; text-align: center; }
    #play-btn { background: #ff4444; color: white; border: none; border-radius: 50px; padding: 16px 32px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255,68,68,0.5); }
    #no-stream { color: white; font-family: sans-serif; display: none; text-align: center; }
  </style>
</head>
<body>
  <div id="overlay"><button id="play-btn" style="display:none">▶ СМОТРЕТЬ ЭФИР</button></div>
  <div id="no-stream">😔 Эфир сейчас не идёт</div>
  <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>

  <script>
    const BIN_ID = "69c813a3ed015c742bc5d6d2";
    const API_KEY = "$2a$10$9x7PNq9qagGerlxyZZ8pMeGMoBn94obeRi87pQFcppRjgFfy989Vq";

    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } })
      .then(r => r.json()).then(data => {
        const url = data.record?.stream_url;
        if (url) {
          document.getElementById('play-btn').style.display = 'block';
          document.getElementById('play-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            let src = "";
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const id = url.match(/(?:live\/|v=|\/)([a-zA-Z0-9_-]{11})/);
                if (id) src = `https://www.youtube.com/embed/${id[1]}?autoplay=1&playsinline=1`;
            } else if (url.includes('vk.com') || url.includes('vkvideo.ru')) {
                const vk = url.match(/video(-?\d+)_(\d+)/);
                src = vk ? `https://vk.com/video_ext.php?oid=${vk[1]}&id=${vk[2]}&autoplay=1` : url;
            } else { src = url; }
            document.getElementById('player').src = src;
          };
        } else { document.getElementById('no-stream').style.display = 'block'; }
      });
  </script>
</body>
</html>
